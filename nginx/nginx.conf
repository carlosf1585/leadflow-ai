events { worker_connections 1024; }
http {
    limit_req_zone $binary_remote_addr zone=lead_submit:10m rate=5r/m;
    server {
        listen 80;
        server_name _;
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        location /api/leads/submit {
            limit_req zone=lead_submit burst=10 nodelay;
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/ {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
        }
        location /health {
            proxy_pass http://api:8000;
        }
    }
}